<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="yames.css">
    <script src="yames.js" defer></script>
    <title>Mot de passe oublié — Hygia</title>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html">
                <img src="img/hygia_logo_transparent.png" alt="Hygia">
            </a>
        </div>
        <div class="nav-center">
            <a href="index.html">Accueil</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="apropos.html">À propos</a>
            <a href="professionnels.html">Professionnels</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <a href="connexion.html" class="nav-compte-link">Connexion</a>
            <a href="panier.html">Panier <span id="cart-count">0</span></a>
        </div>
    </nav>

    <main>
        <section class="auth-page">
            <div class="auth-box">
                <div style="text-align:center;margin-bottom:16px;font-size:40px;">🔐</div>
                <h1>Mot de passe oublié</h1>
                <p class="auth-subtitle">Entrez votre email, nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

                <div id="auth-message" class="auth-message"></div>

                <form id="form-oublie" class="auth-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Votre email" required>
                    <button type="submit" id="btn-envoyer">Envoyer le lien</button>
                </form>

                <p class="auth-switch"><a href="connexion.html">← Retour à la connexion</a></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-legal">
            <a href="politique-confidentialite.html">Politique de confidentialité</a>
            <a href="mentions-legales.html">Mentions légales</a>
        </div>
        <p>&copy; 2026 Hygia. Tous droits réservés.</p>
    </footer>

    <script>
        const BACKEND_URL_LOCAL = "https://nslookup-cluster1-bydepfo-mongodb-net-1.onrender.com";

        document.getElementById("form-oublie").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const msg = document.getElementById("auth-message");
            const btn = document.getElementById("btn-envoyer");

            btn.disabled = true;
            btn.textContent = "Envoi en cours...";
            msg.textContent = "";
            msg.className = "auth-message";

            try {
                const res = await fetch(`${BACKEND_URL_LOCAL}/api/auth/mot-de-passe-oublie`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                msg.textContent = data.message || "Lien envoyé si l'email est enregistré.";
                msg.className = "auth-message success";
                document.getElementById("form-oublie").reset();
            } catch {
                msg.textContent = "Impossible de joindre le serveur. Réessayez.";
                msg.className = "auth-message error";
            } finally {
                btn.disabled = false;
                btn.textContent = "Envoyer le lien";
            }
        });
    </script>

</body>
</html>
