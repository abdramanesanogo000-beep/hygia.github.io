<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="yames.css">
    <script src="yames.js" defer></script>
    <title>Mon compte - Yames</title>
</head>

<body>
    <nav>
        <div class="nav-left">
            <a href="index.html">
                <img src="logo yames.png" alt="logo de yames">
            </a>
        </div>
        <div class="nav-center">
            <a href="index.html">Accueil</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="professionnels.html">Professionnels</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <form action="/recherche" method="GET">
                <label for="search-input">Rechercher</label>
                <input type="search" id="search-input" name="q" placeholder="Rechercher sur le site...">
                <button type="submit">🔍</button>
            </form>

            <a href="connexion.html" class="nav-compte-link">Connexion</a>
            <a href="panier.html">Panier <span id="cart-count">0</span></a>
        </div>
    </nav>

    <main>

        <section class="compte-page">

            <div id="compte-non-connecte" class="auth-box" style="display:none;">
                <h1>Mon compte</h1>
                <p class="auth-subtitle">Vous n'êtes pas connecté.</p>
                <div class="auth-switch-buttons">
                    <a href="connexion.html" class="btn-add-cart" style="width:auto; display:inline-block;">Se
                        connecter</a>
                    <a href="inscription.html" class="btn-continue">Créer un compte</a>
                </div>
            </div>

            <div id="compte-connecte" style="display:none;">
                <div class="compte-header">
                    <div>
                        <h1 id="compte-nom">Bonjour</h1>
                        <p id="compte-email" class="auth-subtitle"></p>
                    </div>
                    <button id="btn-deconnexion" class="btn-deconnexion">Se déconnecter</button>
                </div>

                <h2 class="compte-section-title">Historique de mes commandes</h2>
                <div id="historique-commandes">
                    <!-- généré par JS -->
                </div>
            </div>

        </section>

    </main>

    <footer>
        <div class="footer-socials">
            <a href="">facebook</a>
            <a href="">tiktok</a>
        </div>
        <p>&copy; 2026 Yames. Tous droits réservés.</p>
    </footer>

</body>

</html>
